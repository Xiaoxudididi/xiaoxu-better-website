<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智能营养规划师</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; padding: 20px; }
        .container { max-width: 1200px; margin: 0 auto; }
        .header { text-align: center; color: white; margin-bottom: 30px; }
        .header h1 { font-size: 2.5rem; margin-bottom: 10px; }
        .header p { opacity: 0.9; }
        .section { background: white; border-radius: 16px; padding: 30px; margin-bottom: 20px; box-shadow: 0 10px 40px rgba(0,0,0,0.1); }
        .section h2 { color: #2d3748; margin-bottom: 20px; font-size: 1.5rem; }
        .form-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 5px; color: #4a5568; font-weight: 500; }
        .form-group input, .form-group select { width: 100%; padding: 12px; border: 2px solid #e2e8f0; border-radius: 8px; font-size: 14px; transition: border-color 0.3s; }
        .form-group input:focus, .form-group select:focus { outline: none; border-color: #667eea; }
        .submit-btn { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; border: none; padding: 15px 40px; border-radius: 10px; font-size: 16px; font-weight: 600; cursor: pointer; transition: transform 0.2s; }
        .submit-btn:hover { transform: translateY(-2px); }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .stat-item { text-align: center; padding: 20px; background: #f7fafc; border-radius: 12px; }
        .stat-value { display: block; font-size: 2rem; font-weight: bold; color: #667eea; }
        .stat-label { color: #718096; font-size: 14px; }
        .week-day { background: #f7fafc; border-radius: 12px; padding: 20px; margin-bottom: 20px; }
        .week-day h3 { color: #2d3748; margin-bottom: 15px; border-bottom: 2px solid #667eea; padding-bottom: 10px; font-size: 1.2rem; }
        .day-meals { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 15px; }
        .mini-meal-card { background: white; border-radius: 10px; padding: 15px; }
        .recipe-visual { font-size: 24px; margin-bottom: 8px; }
        .recipe-name { font-weight: bold; font-size: 14px; color: #2d3748; margin-bottom: 8px; }
        .recipe-description { font-size: 12px; color: #4a5568; line-height: 1.5; margin-bottom: 10px; }
        .recipe-link { background: #667eea; color: white; border: none; padding: 6px 12px; border-radius: 6px; font-size: 12px; cursor: pointer; transition: background 0.3s; }
        .recipe-link:hover { background: #5a6fd6; }
        .nutrition-info { font-size: 11px; color: #718096; margin-top: 8px; }
        .hidden { display: none; }
        .modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); display: flex; align-items: center; justify-content: center; z-index: 1000; }
        .modal-content { background: white; border-radius: 16px; padding: 30px; max-width: 500px; width: 90%; max-height: 80vh; overflow-y: auto; }
        .modal-content h3 { font-size: 1.2rem; color: #2d3748; margin-bottom: 20px; }
        .modal-content button { background: none; border: none; font-size: 24px; cursor: pointer; color: #718096; float: right; }
        .modal-content ul { list-style: none; padding: 0; }
        .modal-content li { padding: 6px 0; border-bottom: 1px solid #e2e8f0; font-size: 14px; color: #4a5568; }
        .modal-content ol { padding-left: 20px; }
        .modal-content ol li { padding: 8px 0; font-size: 14px; color: #4a5568; line-height: 1.6; border: none; }
        .tip-box { background: #fef3c7; padding: 12px; border-radius: 8px; margin-top: 15px; }
        .tip-box p { font-size: 14px; color: #92400e; margin: 0; }
    </style>
</head>
<body>
    <div class="container">
        <header class="header">
            <h1>🍎 智能营养规划师</h1>
            <p>根据您的身体数据，为您定制专属饮食计划</p>
        </header>

        <section id="input-section" class="section">
            <h2>输入您的个人信息</h2>
            <form id="nutrition-form">
                <div class="form-row">
                    <div class="form-group"><label>年龄</label><input type="number" id="age" placeholder="请输入年龄"></div>
                    <div class="form-group"><label>性别</label><select id="gender"><option value="">请选择</option><option value="male">男</option><option value="female">女</option></select></div>
                    <div class="form-group"><label>身高 (cm)</label><input type="number" id="height" placeholder="请输入身高"></div>
                    <div class="form-group"><label>体重 (kg)</label><input type="number" id="weight" placeholder="请输入体重"></div>
                </div>
                <div class="form-row">
                    <div class="form-group"><label>活动水平</label><select id="activity"><option value="">请选择</option><option value="sedentary">久坐型</option><option value="light">轻度活动</option><option value="moderate">中度活动</option><option value="active">高度活动</option></select></div>
                    <div class="form-group"><label>健康目标</label><select id="goal"><option value="">请选择</option><option value="maintain">维持体重</option><option value="lose">减脂</option><option value="gain">增肌</option></select></div>
                    <div class="form-group"><label>生成天数</label><select id="days"><option value="1">1天</option><option value="3">3天</option><option value="7">7天</option></select></div>
                </div>
                <button type="submit" class="submit-btn">生成饮食计划</button>
            </form>
        </section>

        <section id="result-section" class="section hidden">
            <h2>📊 您的专属饮食计划</h2>
            <div class="stats-grid">
                <div class="stat-item"><span class="stat-value" id="calories"></span><span class="stat-label">每日热量需求</span></div>
                <div class="stat-item"><span class="stat-value" id="bmi"></span><span class="stat-label">BMI指数</span></div>
                <div class="stat-item"><span class="stat-value" id="bmr"></span><span class="stat-label">基础代谢率</span></div>
            </div>
            <div id="week-plan-container"></div>
            <button onclick="document.getElementById('input-section').classList.remove('hidden'); document.getElementById('result-section').classList.add('hidden')" class="submit-btn" style="margin-top:20px;">返回修改</button>
        </section>
    </div>

    <script>
        const recipeDatabase = {
            breakfast: [
                { name: '燕麦牛奶鸡蛋', description: '燕麦片1小碗(约80g) + 牛奶1杯(250ml) + 鸡蛋1个', visual: '🥣🍳', recipeId: 'oatmeal-egg', calories: 450, protein: 25 },
                { name: '全麦面包配牛奶', description: '全麦面包2片(约80g) + 牛奶1杯(250ml) + 苹果1个(中等大小)', visual: '🍞🥛🍎', recipeId: 'bread-milk', calories: 420, protein: 22 },
                { name: '小米粥配鸡蛋', description: '小米粥1碗(约100g) + 鸡蛋1个 + 凉拌黄瓜1根(约100g)', visual: '🥣🍳🥒', recipeId: 'millet-porridge', calories: 380, protein: 18 },
                { name: '玉米鸡蛋套餐', description: '玉米1根(中等大小) + 鸡蛋1个 + 酸奶1小盒(100g)', visual: '🌽🍳🥛', recipeId: 'corn-egg', calories: 400, protein: 20 }
            ],
            lunch: [
                { name: '白米饭配鸡胸肉炒西兰花', description: '白米饭1碗(约100g) + 鸡胸肉1块(约100g) + 西兰花1小颗(约150g)', visual: '🍚🍗🥦', recipeId: 'chicken-broccoli', calories: 650, protein: 40 },
                { name: '全麦馒头配番茄炒蛋', description: '全麦馒头1个(约100g) + 鸡蛋2个 + 番茄1个(中等大小)', visual: '🥠🍅🍳', recipeId: 'tomato-egg', calories: 580, protein: 32 },
                { name: '糙米配豆腐炒青菜', description: '糙米饭1碗(约100g) + 豆腐1块(约100g) + 青菜1把(约150g)', visual: '🍚🧈🥬', recipeId: 'tofu-vegetables', calories: 520, protein: 28 },
                { name: '米饭配红烧豆腐', description: '白米饭1碗(约100g) + 豆腐1块(约100g) + 蘑菇5-6朵 + 胡萝卜半根', visual: '🍚🧈🍄🥕', recipeId: 'braised-tofu', calories: 550, protein: 25 }
            ],
            dinner: [
                { name: '小米粥配清蒸鱼', description: '小米粥1碗(约100g) + 鱼肉1块(约100g) + 菠菜1把(约100g)', visual: '🥣🐟🥬', recipeId: 'fish-porridge', calories: 480, protein: 35 },
                { name: '全麦馒头配鸡蛋炒黄瓜', description: '全麦馒头1个(约100g) + 鸡蛋2个 + 黄瓜1根(约100g)', visual: '🥠🍳🥒', recipeId: 'egg-cucumber', calories: 450, protein: 28 },
                { name: '米饭配茄子炒青椒', description: '白米饭1碗(约100g) + 茄子1根(约100g) + 青椒1个(约100g)', visual: '🍚🍆🫑', recipeId: 'eggplant-pepper', calories: 500, protein: 22 },
                { name: '面条配番茄鸡蛋卤', description: '面条100g + 鸡蛋2个 + 番茄1个 + 青菜1小把', visual: '🍜🍅🍳', recipeId: 'noodle-tomato', calories: 520, protein: 26 }
            ],
            snack: [
                { name: '苹果配核桃', description: '苹果1个(中等大小) + 核桃2颗', visual: '🍎🥜', recipeId: 'apple-walnut', calories: 180, protein: 5 },
                { name: '香蕉配杏仁', description: '香蕉1根(中等大小) + 杏仁15颗', visual: '🍌🥜', recipeId: 'banana-almond', calories: 200, protein: 6 },
                { name: '黄瓜配花生', description: '黄瓜1根(约100g) + 花生20g', visual: '🥒🥜', recipeId: 'cucumber-peanut', calories: 150, protein: 5 },
                { name: '橙子配葵花籽', description: '橙子1个(中等大小) + 葵花籽20g', visual: '🍊🌻', recipeId: 'orange-sunflower', calories: 160, protein: 4 }
            ]
        };

        const detailedRecipes = {
            'oatmeal-egg': { ingredients: ['燕麦片80g', '牛奶250ml', '鸡蛋1个', '盐少许'], steps: ['将燕麦片放入碗中，加入牛奶浸泡5分钟', '放入微波炉加热1-2分钟，或用锅小火煮3分钟', '另起一锅，少油煎鸡蛋，撒少许盐', '将煎好的鸡蛋放在燕麦粥上即可'], tips: '喜欢甜口可以加一小勺蜂蜜' },
            'bread-milk': { ingredients: ['全麦面包2片', '牛奶250ml', '苹果1个'], steps: ['面包放入面包机或平底锅烤至微焦', '牛奶加热至温热', '苹果洗净切块', '搭配食用即可'], tips: '面包可以抹少许花生酱增加风味' },
            'millet-porridge': { ingredients: ['小米50g', '水500ml', '鸡蛋1个', '黄瓜1根', '盐少许', '香油几滴'], steps: ['小米淘洗干净，加水煮20分钟至软烂', '鸡蛋煮熟剥壳切块', '黄瓜切丝，加少许盐和香油拌匀', '搭配食用'], tips: '小米粥煮好后可以焖5分钟更软糯' },
            'corn-egg': { ingredients: ['玉米1根', '鸡蛋1个', '酸奶100g'], steps: ['玉米蒸熟或煮熟', '鸡蛋煮熟', '搭配酸奶食用'], tips: '玉米可以用微波炉加热' },
            'chicken-broccoli': { ingredients: ['鸡胸肉100g', '西兰花150g', '蒜末少许', '盐适量', '生抽1勺', '蚝油半勺', '食用油1汤匙'], steps: ['鸡胸肉切片，用少许盐和生抽腌制10分钟', '西兰花切成小朵，焯水备用', '锅中倒油，放入蒜末爆香', '加入鸡胸肉片翻炒至变色', '加入西兰花翻炒，加蚝油和盐调味', '翻炒均匀出锅'], tips: '鸡胸肉切薄一点更容易熟' },
            'tomato-egg': { ingredients: ['番茄1个', '鸡蛋2个', '葱花少许', '盐适量', '生抽1勺', '食用油1汤匙'], steps: ['番茄洗净切块，鸡蛋打散备用', '锅中倒油，油热后倒入鸡蛋液炒至凝固，盛出备用', '锅中再倒少许油，放入番茄块翻炒出汁', '加入炒好的鸡蛋，加生抽和盐调味', '撒葱花出锅'], tips: '番茄可以去皮口感更好' },
            'tofu-vegetables': { ingredients: ['豆腐1块', '青菜150g', '姜末少许', '盐适量', '生抽1勺', '食用油1汤匙'], steps: ['豆腐切小块，青菜洗净切段', '锅中倒油，放入姜末爆香', '加入豆腐块轻轻翻炒', '加入青菜翻炒至变软', '加生抽和盐调味即可'], tips: '豆腐用盐水泡一下不容易碎' },
            'braised-tofu': { ingredients: ['豆腐1块', '蘑菇5-6朵', '胡萝卜半根', '葱花少许', '盐适量', '生抽1勺', '老抽半勺', '糖少许', '食用油1汤匙'], steps: ['豆腐切小块，蘑菇切片，胡萝卜切块', '锅中倒油，放入豆腐煎至金黄', '加入蘑菇和胡萝卜翻炒', '加生抽、老抽、糖和水，小火焖5分钟', '加盐调味，撒葱花出锅'], tips: '可以加少许豆瓣酱增加风味' },
            'fish-porridge': { ingredients: ['小米50g', '鱼肉100g', '菠菜100g', '姜片2片', '盐适量', '香油几滴'], steps: ['小米淘洗干净，加水煮20分钟', '鱼肉切片，用盐腌制5分钟', '菠菜焯水切段', '将鱼片和姜片加入小米粥中', '小火煮5分钟至鱼片熟透', '加入菠菜，加盐调味', '滴几滴香油出锅'], tips: '鱼片很容易熟，不要煮太久' },
            'egg-cucumber': { ingredients: ['鸡蛋2个', '黄瓜1根', '葱花少许', '盐适量', '食用油1汤匙'], steps: ['鸡蛋打散，黄瓜切丝', '锅中倒油，倒入鸡蛋液炒至凝固', '加入黄瓜丝翻炒', '加盐调味，撒葱花出锅'], tips: '黄瓜可以先腌一下更入味' },
            'eggplant-pepper': { ingredients: ['茄子1根', '青椒1个', '蒜末少许', '盐适量', '生抽1勺', '蚝油半勺', '食用油2汤匙'], steps: ['茄子和青椒切块', '锅中倒油，放入茄子煎至变软', '加入青椒和蒜末翻炒', '加生抽、蚝油和盐调味', '翻炒均匀出锅'], tips: '茄子可以先用盐腌一下去水' },
            'noodle-tomato': { ingredients: ['面条100g', '鸡蛋2个', '番茄1个', '青菜1小把', '盐适量', '生抽1勺', '食用油1汤匙'], steps: ['番茄切块，鸡蛋打散', '锅中倒油，倒入鸡蛋液炒至凝固，盛出', '锅中再倒少许油，放入番茄炒出汁', '加水烧开，下面条煮熟', '加入青菜和炒好的鸡蛋', '加生抽和盐调味'], tips: '面条过凉水更劲道' },
            'apple-walnut': { ingredients: ['苹果1个', '核桃2颗'], steps: ['苹果洗净切块', '核桃砸开取仁', '搭配食用即可'], tips: '核桃可以稍微烤一下更香' },
            'banana-almond': { ingredients: ['香蕉1根', '杏仁15颗'], steps: ['香蕉剥皮切段', '搭配杏仁食用'], tips: '杏仁可以碾碎撒在香蕉上' },
            'cucumber-peanut': { ingredients: ['黄瓜1根', '花生20g', '盐少许', '醋半勺'], steps: ['黄瓜洗净切片', '花生炒熟放凉', '将黄瓜和花生放入碗中，加盐和醋拌匀'], tips: '花生可以用烤箱烤更香' },
            'orange-sunflower': { ingredients: ['橙子1个', '葵花籽20g'], steps: ['橙子剥皮', '搭配葵花籽食用'], tips: '葵花籽不要吃太多' }
        };

        function calculateBMR(age, gender, height, weight) {
            return gender === 'male' ? 10 * weight + 6.25 * height - 5 * age + 5 : 10 * weight + 6.25 * height - 5 * age - 161;
        }

        function calculateTDEE(bmr, activity) {
            const factors = { sedentary: 1.2, light: 1.375, moderate: 1.55, active: 1.725 };
            return bmr * factors[activity];
        }

        function calculateCalories(tdee, goal) {
            return goal === 'lose' ? tdee - 500 : goal === 'gain' ? tdee + 500 : tdee;
        }

        function calculateBMI(weight, height) {
            return weight / Math.pow(height / 100, 2);
        }

        function getRandomItem(arr) {
            return arr[Math.floor(Math.random() * arr.length)];
        }

        function generateMealPlan(days) {
            const plan = [];
            const usedRecipes = {};
            
            for(let i = 0; i < days; i++) {
                const dayPlan = {};
                ['breakfast', 'lunch', 'dinner', 'snack'].forEach(mealType => {
                    let recipe;
                    let attempts = 0;
                    do {
                        recipe = getRandomItem(recipeDatabase[mealType]);
                        attempts++;
                    } while (usedRecipes[recipe.name] >= 2 && attempts < 10);
                    usedRecipes[recipe.name] = (usedRecipes[recipe.name] || 0) + 1;
                    dayPlan[mealType] = recipe;
                });
                plan.push(dayPlan);
            }
            return plan;
        }

        function showRecipeDetail(recipeId, recipeName) {
            const recipe = detailedRecipes[recipeId];
            if (!recipe) return;

            const modal = document.createElement('div');
            modal.className = 'modal-overlay';
            modal.innerHTML = `
                <div class="modal-content">
                    <button onclick="this.parentElement.parentElement.remove()">✕</button>
                    <h3>📖 ${recipeName}</h3>
                    <h4 style="margin: 15px 0 10px;">🥘 食材清单</h4>
                    <ul>${recipe.ingredients.map(i => `<li>• ${i}</li>`).join('')}</ul>
                    <h4 style="margin: 15px 0 10px;">👩🍳 烹饪步骤</h4>
                    <ol>${recipe.steps.map(s => `<li>${s}</li>`).join('')}</ol>
                    ${recipe.tips ? `<div class="tip-box"><p>💡 小贴士：${recipe.tips}</p></div>` : ''}
                </div>
            `;
            document.body.appendChild(modal);
        }

        document.getElementById('nutrition-form').addEventListener('submit', function(e) {
            e.preventDefault();
            const age = parseInt(document.getElementById('age').value);
            const gender = document.getElementById('gender').value;
            const height = parseInt(document.getElementById('height').value);
            const weight = parseInt(document.getElementById('weight').value);
            const activity = document.getElementById('activity').value;
            const goal = document.getElementById('goal').value;
            const days = parseInt(document.getElementById('days').value);

            if(!age || !gender || !height || !weight || !activity || !goal) {
                alert('请填写所有必填项');
                return;
            }

            const bmr = calculateBMR(age, gender, height, weight);
            const tdee = calculateTDEE(bmr, activity);
            const calories = calculateCalories(tdee, goal);
            const bmi = calculateBMI(weight, height);

            document.getElementById('calories').textContent = Math.round(calories) + ' kcal';
            document.getElementById('bmi').textContent = bmi.toFixed(1);
            document.getElementById('bmr').textContent = Math.round(bmr);

            const mealPlan = generateMealPlan(days);
            const dayNames = ['周一', '周二', '周三', '周四', '周五', '周六', '周日'];
            
            let html = '';
            mealPlan.forEach((day, index) => {
                html += `
                    <div class="week-day">
                        <h3>📅 ${dayNames[index]}</h3>
                        <div class="day-meals">
                            ${Object.entries(day).map(([type, recipe]) => `
                                <div class="mini-meal-card">
                                    <div>${type === 'breakfast' ? '🍳 早餐' : type === 'lunch' ? '🍛 午餐' : type === 'dinner' ? '🍲 晚餐' : '🍎 加餐'}</div>
                                    <div class="recipe-visual">${recipe.visual}</div>
                                    <div class="recipe-name">${recipe.name}</div>
                                    <div class="recipe-description">${recipe.description}</div>
                                    <div class="nutrition-info">${recipe.calories} kcal | 蛋白质 ${recipe.protein}g</div>
                                    <button class="recipe-link" onclick="showRecipeDetail('${recipe.recipeId}', '${recipe.name}')">📖 做法</button>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                `;
            });
            document.getElementById('week-plan-container').innerHTML = html;

            document.getElementById('input-section').classList.add('hidden');
            document.getElementById('result-section').classList.remove('hidden');
        });
    </script>
</body>
</html>
